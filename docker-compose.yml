services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: art3mis-soc-ai-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/art3mis_soc_ai.db:/app/art3mis_soc_ai.db
    environment:
      - OLLAMA_URL=http://host.docker.internal:11434/api/generate
      - OLLAMA_MODEL=llama3.2
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: art3mis-soc-ai-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped